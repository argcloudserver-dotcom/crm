# AUDIT FIX (v12): CI workflow — runs tests, typecheck, and lint (if defined)
# on every push and pull request.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: test / typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: false

      - name: Lint (if defined)
        run: pnpm -r --if-present run lint

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: development
          AUTH_MODE: mock
